<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claude-crap :: dashboard</title>
    <!--
      Vue 3.5.13 production global build, vendored under
      `src/dashboard/public/vendor/`. The plugin deliberately does NOT
      fetch Vue from a CDN: the dashboard must work offline after
      `npm install`, the supply chain must be pinned to whatever
      shipped inside the npm tarball, and the previous CDN reference
      had no Subresource Integrity attribute (see F-A03-01 in the
      OWASP scan). Refresh this file by re-running
      `curl -fsSL https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js
      -o src/dashboard/public/vendor/vue.global.prod.js` and bumping
      the version string in the filename if you upgrade Vue.
    -->
    <script src="./vendor/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0d10;
        --card: #14181d;
        --border: #232831;
        --fg: #e7eaef;
        --muted: #8a93a3;
        --accent: #3ea6ff;
        --rating-A: #2ecc71;
        --rating-B: #9bcc2e;
        --rating-C: #f1c40f;
        --rating-D: #e67e22;
        --rating-E: #e74c3c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
      }
      header {
        padding: 24px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }
      header h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      header h1 small {
        color: var(--muted);
        font-weight: 400;
        margin-left: 8px;
      }
      header .meta {
        color: var(--muted);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      main {
        padding: 32px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid.summary {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      @media (max-width: 880px) {
        .grid.summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
      }
      .card h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      .rating {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        font-size: 32px;
        font-weight: 700;
        color: #0b0d10;
        margin: 8px 0 12px 0;
      }
      .rating-A { background: var(--rating-A); }
      .rating-B { background: var(--rating-B); }
      .rating-C { background: var(--rating-C); }
      .rating-D { background: var(--rating-D); }
      .rating-E { background: var(--rating-E); }
      .card .detail {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      table th,
      table td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      table th {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 500;
      }
      table tr:last-child td {
        border-bottom: none;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .pill-error { background: rgba(231, 76, 60, 0.2); color: #ff7062; }
      .pill-warning { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
      .pill-note { background: rgba(62, 166, 255, 0.2); color: var(--accent); }
      .empty {
        padding: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 32px 0 12px 0;
      }
      .verdict {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .verdict.passes { background: rgba(46, 204, 113, 0.18); color: var(--rating-A); }
      .verdict.fails { background: rgba(231, 76, 60, 0.18); color: var(--rating-E); }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      pre {
        background: var(--bg);
        padding: 12px;
        border-radius: 6px;
        font-size: 12px;
        overflow-x: auto;
      }
      .file-link {
        cursor: pointer;
        color: var(--accent);
      }
      .file-link:hover {
        text-decoration: underline;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--accent);
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 16px;
      }
      .back-link:hover { text-decoration: underline; }
      .file-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .file-header h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        word-break: break-all;
      }
      .lang-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: rgba(62, 166, 255, 0.15);
        color: var(--accent);
      }
      .grid.file-summary {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 8px;
      }
      @media (max-width: 880px) {
        .grid.file-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .card .stat-value {
        font-size: 28px;
        font-weight: 700;
        margin: 4px 0 8px 0;
        font-variant-numeric: tabular-nums;
      }
      .source-view {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow-x: auto;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        font-size: 12px;
        line-height: 1.6;
      }
      .source-line {
        display: flex;
        min-height: 20px;
        border-bottom: 1px solid transparent;
      }
      .source-line:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      .line-error {
        background: rgba(231, 76, 60, 0.12);
      }
      .line-warning {
        background: rgba(241, 196, 15, 0.08);
      }
      .line-note {
        background: rgba(62, 166, 255, 0.08);
      }
      .line-fn-start {
        border-top: 1px solid rgba(46, 204, 113, 0.25);
      }
      .line-number {
        flex-shrink: 0;
        width: 56px;
        padding: 0 12px 0 12px;
        text-align: right;
        color: var(--muted);
        user-select: none;
        opacity: 0.6;
      }
      .line-gutter {
        flex-shrink: 0;
        width: 28px;
        text-align: center;
        padding: 0 2px;
      }
      .gutter-marker {
        display: inline-block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        font-size: 10px;
        font-weight: 700;
        line-height: 18px;
        text-align: center;
        color: #0b0d10;
      }
      .gutter-error { background: var(--rating-E); }
      .gutter-warning { background: var(--rating-C); }
      .gutter-note { background: var(--accent); }
      .line-code {
        flex: 1;
        padding: 0 16px 0 4px;
        white-space: pre;
        tab-size: 4;
      }
      .line-fn-label {
        color: var(--rating-A);
        font-size: 10px;
        font-weight: 600;
        opacity: 0.7;
        margin-left: 12px;
      }
      /* CC heat bar — ReportGenerator-style visual severity */
      .heat-bar {
        position: relative;
        width: 140px;
        height: 8px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
      }
      .heat-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 120ms ease-out;
      }
      .heat-bar-threshold {
        position: absolute;
        top: -2px;
        bottom: -2px;
        width: 1px;
        background: rgba(255, 255, 255, 0.35);
      }
      /* CC chip — numeric value + % of threshold */
      .cc-chip {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-variant-numeric: tabular-nums;
      }
      .cc-chip .cc-value {
        font-weight: 700;
        font-size: 13px;
      }
      .cc-chip .cc-ratio {
        font-size: 11px;
        color: var(--muted);
      }
      /* Method name button — scrolls source view to fn start line */
      .method-jump {
        background: none;
        border: none;
        padding: 0;
        font: inherit;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        font-size: 13px;
        color: var(--accent);
        cursor: pointer;
      }
      .method-jump:hover { text-decoration: underline; }
      /* "Open in editor" icon link */
      .editor-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 4px;
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        transition: background 120ms, color 120ms;
      }
      .editor-link:hover {
        background: rgba(62, 166, 255, 0.12);
        color: var(--accent);
        text-decoration: none;
      }
      /* "Show all / show fewer" toggle under the methods table */
      .show-all-btn {
        display: inline-block;
        margin: 12px 0 0 0;
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--accent);
        font-size: 12px;
        cursor: pointer;
      }
      .show-all-btn:hover {
        background: rgba(62, 166, 255, 0.08);
      }
      /* Line-flash animation when the user jumps to a source line */
      .source-line.jump-target {
        animation: jumpFlash 1.2s ease-out;
      }
      @keyframes jumpFlash {
        0%   { background: rgba(62, 166, 255, 0.35); }
        100% { background: transparent; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>
          claude-crap
          <small>local quality dashboard</small>
        </h1>
        <div class="meta" v-if="score">
          <span>{{ score.loc.physical }} LOC · {{ score.loc.files }} files</span>
          &nbsp;·&nbsp;
          <span>refreshed {{ formatTimestamp(score.generatedAt) }}</span>
        </div>
      </header>

      <main>
        <!-- ═══ FILE DETAIL VIEW ═══ -->
        <template v-if="currentView === 'file-detail' && fileDetail">
          <div class="back-link" @click="goBack()">&#8592; Back to dashboard</div>
          <div class="file-header">
            <h2>{{ fileDetail.filePath }}</h2>
            <span v-if="fileDetail.language" class="lang-badge">{{ fileDetail.language }}</span>
          </div>

          <!-- Summary cards -->
          <div class="grid file-summary">
            <div class="card">
              <h2>Lines of Code</h2>
              <div class="stat-value">{{ fileDetail.physicalLoc }}</div>
              <div class="detail">{{ fileDetail.logicalLoc }} logical lines</div>
            </div>
            <div class="card">
              <h2>Functions</h2>
              <div class="stat-value">{{ fileDetail.functions.length }}</div>
              <div class="detail">
                Avg CC: {{ fileDetail.summary.avgComplexity }} · Max CC: {{ fileDetail.summary.maxComplexity }}
              </div>
            </div>
            <div class="card">
              <h2>Findings</h2>
              <div class="stat-value" :style="{ color: fileDetail.summary.totalFindings > 0 ? 'var(--rating-D)' : 'var(--rating-A)' }">
                {{ fileDetail.summary.totalFindings }}
              </div>
              <div class="detail">
                {{ fileDetail.summary.errorCount }} error · {{ fileDetail.summary.warningCount }} warning · {{ fileDetail.summary.noteCount }} note
              </div>
            </div>
            <div class="card">
              <h2>Effort</h2>
              <div class="stat-value">{{ fileDetail.summary.totalEffortMinutes }}m</div>
              <div class="detail">Estimated remediation</div>
            </div>
          </div>

          <!-- Methods table — top-5 by CC with heat bar + jump + editor link -->
          <div v-if="fileDetail.functions.length" class="section-title">
            Methods
            <span style="color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px;">
              threshold CC {{ fileDetail.cyclomaticMax }}
            </span>
          </div>
          <div v-if="fileDetail.functions.length" class="card">
            <table>
              <thead>
                <tr>
                  <th>Method</th>
                  <th style="text-align: right">Line</th>
                  <th style="width: 180px;">CC</th>
                  <th style="text-align: right">Lines</th>
                  <th>Status</th>
                  <th style="width: 32px;"></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="fn in visibleFunctions" :key="fn.startLine">
                  <td>
                    <button
                      class="method-jump"
                      @click="jumpToLine(fn.startLine)"
                      :title="'Jump to line ' + fn.startLine"
                    >{{ fn.name }}</button>
                  </td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ fn.startLine }}</td>
                  <td>
                    <div class="cc-chip">
                      <div class="heat-bar" :title="ccTooltip(fn)">
                        <div
                          class="heat-bar-fill"
                          :style="heatBarStyle(fn)"
                        ></div>
                        <div
                          class="heat-bar-threshold"
                          :style="{ left: thresholdMarker() + '%' }"
                        ></div>
                      </div>
                      <span class="cc-value" :style="{ color: ccColor(fn) }">{{ fn.cyclomaticComplexity }}</span>
                      <span class="cc-ratio">{{ ccRatio(fn) }}%</span>
                    </div>
                  </td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ fn.lineCount }}</td>
                  <td>
                    <span v-if="fn.cyclomaticComplexity >= fileDetail.cyclomaticMax * 2" class="pill pill-error">error</span>
                    <span v-else-if="fn.cyclomaticComplexity > fileDetail.cyclomaticMax" class="pill pill-warning">warning</span>
                    <span v-else class="pill pill-note">ok</span>
                  </td>
                  <td>
                    <a
                      class="editor-link"
                      :href="editorLink(fn)"
                      :title="'Open ' + fileDetail.filePath + ':' + fn.startLine + ' in VS Code'"
                    >&#x2197;</a>
                  </td>
                </tr>
              </tbody>
            </table>
            <button
              v-if="fileDetail.functions.length > topMethodsLimit"
              class="show-all-btn"
              @click="toggleShowAllMethods()"
            >
              {{ showAllMethods ? 'Show top ' + topMethodsLimit : 'Show all ' + fileDetail.functions.length + ' methods' }}
            </button>
          </div>

          <!-- Findings table -->
          <div v-if="fileDetail.findings.length" class="section-title">Findings</div>
          <div v-if="fileDetail.findings.length" class="card">
            <table>
              <thead>
                <tr>
                  <th>Rule</th>
                  <th>Level</th>
                  <th>Message</th>
                  <th style="text-align: right">Line</th>
                  <th>Tool</th>
                  <th style="text-align: right">Effort</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(f, i) in sortedFindings" :key="i">
                  <td><code>{{ f.ruleId }}</code></td>
                  <td>
                    <span :class="'pill pill-' + f.level">{{ f.level }}</span>
                  </td>
                  <td style="max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ f.message }}</td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ f.startLine }}</td>
                  <td>{{ f.sourceTool }}</td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ f.effortMinutes }}m</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Annotated source code -->
          <div class="section-title">Source</div>
          <div class="source-view">
            <div
              v-for="(line, idx) in fileDetail.sourceLines"
              :key="idx"
              :class="['source-line', lineClass(idx + 1)]"
            >
              <div class="line-number">{{ idx + 1 }}</div>
              <div class="line-gutter">
                <span
                  v-if="lineFindings(idx + 1).length"
                  :class="['gutter-marker', gutterClass(idx + 1)]"
                  :title="lineFindings(idx + 1).map(f => f.ruleId + ': ' + f.message).join('\\n')"
                >{{ lineFindings(idx + 1).length }}</span>
              </div>
              <div class="line-code">{{ line }}<span v-if="lineFnLabel(idx + 1)" class="line-fn-label">{{ lineFnLabel(idx + 1) }}</span></div>
            </div>
          </div>
        </template>

        <!-- ═══ DASHBOARD VIEW ═══ -->
        <div v-else-if="currentView === 'dashboard' && loading" class="empty">Loading project score…</div>
        <div v-else-if="currentView === 'dashboard' && error" class="empty">
          Failed to load score: <code>{{ error }}</code>
        </div>
        <template v-else-if="currentView === 'dashboard' && score">
          <!-- Top summary cards -->
          <div class="grid summary">
            <div class="card">
              <h2>Overall</h2>
              <div :class="['rating', 'rating-' + score.overall.rating]">{{ score.overall.rating }}</div>
              <div class="detail">
                <span :class="['verdict', score.overall.passes ? 'passes' : 'fails']">
                  {{ score.overall.passes ? 'Passes policy' : 'Fails policy' }}
                </span>
                <br />
                Policy ceiling: <strong>{{ score.overall.policyRating }}</strong>
              </div>
            </div>
            <div class="card">
              <h2>Maintainability</h2>
              <div :class="['rating', 'rating-' + score.maintainability.rating]">{{ score.maintainability.rating }}</div>
              <div class="detail">
                TDR <strong>{{ score.maintainability.tdrPercent }}%</strong><br />
                {{ score.maintainability.remediationMinutes }} min remediation
              </div>
            </div>
            <div class="card">
              <h2>Reliability</h2>
              <div :class="['rating', 'rating-' + score.reliability.rating]">{{ score.reliability.rating }}</div>
              <div class="detail">
                {{ score.reliability.errorFindings }} error · {{ score.reliability.warningFindings }} warning · {{ score.reliability.noteFindings }} note
              </div>
            </div>
            <div class="card">
              <h2>Security</h2>
              <div :class="['rating', 'rating-' + score.security.rating]">{{ score.security.rating }}</div>
              <div class="detail">
                {{ score.security.errorFindings }} error · {{ score.security.warningFindings }} warning · {{ score.security.noteFindings }} note
              </div>
            </div>
          </div>

          <!-- Findings by tool -->
          <div class="section-title">Findings by tool</div>
          <div class="card">
            <table v-if="toolEntries.length">
              <thead>
                <tr>
                  <th>Tool</th>
                  <th style="text-align: right">Findings</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="[tool, count] in toolEntries" :key="tool">
                  <td>{{ tool }}</td>
                  <td style="text-align: right">{{ count }}</td>
                </tr>
              </tbody>
            </table>
            <div v-else class="empty">No scanners have ingested findings yet.</div>
          </div>

          <!-- Findings by file (top 10 hot spots) -->
          <div class="section-title">Top 10 hottest files</div>
          <div class="card">
            <table v-if="fileEntries.length">
              <thead>
                <tr>
                  <th>File</th>
                  <th style="text-align: right">Findings</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="[file, count] in fileEntries" :key="file">
                  <td><code class="file-link" @click="navigateToFile(file)">{{ file }}</code></td>
                  <td style="text-align: right">{{ count }}</td>
                </tr>
              </tbody>
            </table>
            <div v-else class="empty">No findings in the consolidated SARIF report yet.</div>
          </div>

          <!-- Complexity hotspots -->
          <div class="section-title">Complexity Hotspots</div>
          <div class="card">
            <div v-if="complexity" style="margin-bottom: 12px; color: var(--muted); font-size: 13px;">
              Threshold: <strong style="color: var(--fg);">{{ complexity.threshold }}</strong>
              &nbsp;·&nbsp;
              {{ complexity.totalFunctions }} functions analyzed
              &nbsp;·&nbsp;
              <span :style="{ color: complexity.violationCount > 0 ? 'var(--rating-D)' : 'var(--rating-A)' }">
                {{ complexity.violationCount }} violation{{ complexity.violationCount !== 1 ? 's' : '' }}
              </span>
            </div>
            <table v-if="complexity && complexity.topFunctions.length">
              <thead>
                <tr>
                  <th>File</th>
                  <th>Function</th>
                  <th style="text-align: right">CC</th>
                  <th style="text-align: right">Lines</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="fn in complexity.topFunctions" :key="fn.filePath + ':' + fn.startLine">
                  <td><code class="file-link" @click="navigateToFile(fn.filePath)">{{ fn.filePath }}</code></td>
                  <td><code>{{ fn.name }}</code></td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ fn.cyclomaticComplexity }}</td>
                  <td style="text-align: right; font-variant-numeric: tabular-nums;">{{ fn.lineCount }}</td>
                  <td>
                    <span v-if="fn.cyclomaticComplexity >= complexity.threshold * 2" class="pill pill-error">error</span>
                    <span v-else-if="fn.cyclomaticComplexity > complexity.threshold" class="pill pill-warning">warning</span>
                    <span v-else class="pill pill-note">ok</span>
                  </td>
                </tr>
              </tbody>
            </table>
            <div v-else-if="complexity" class="empty">No functions analyzed yet.</div>
            <div v-else class="empty">Loading complexity data…</div>
          </div>

          <!-- Where to drill in -->
          <div class="section-title">Reports</div>
          <div class="card">
            <p style="margin: 0 0 8px 0">
              <strong>SARIF document:</strong>
              <a href="/api/sarif" target="_blank">/api/sarif</a>
            </p>
            <p style="margin: 0 0 8px 0">
              <strong>Score JSON:</strong>
              <a href="/api/score" target="_blank">/api/score</a>
            </p>
            <p style="margin: 0; color: var(--muted); font-size: 12px">
              Local file: <code>{{ score.location.sarifReportPath }}</code>
            </p>
          </div>
        </template>
      </main>
    </div>

    <script>
      const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;

      createApp({
        setup() {
          // ── Navigation state ──
          const currentView = ref("dashboard"); // "dashboard" | "file-detail"
          const selectedFile = ref(null);
          const fileDetail = ref(null);

          // ── Dashboard state ──
          const score = ref(null);
          const complexity = ref(null);
          const loading = ref(true);
          const error = ref(null);

          const toolEntries = computed(() => {
            if (!score.value) return [];
            return Object.entries(score.value.findings.byTool).sort((a, b) => b[1] - a[1]);
          });

          const fileEntries = computed(() => {
            if (!score.value) return [];
            return Object.entries(score.value.findings.byFile)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 10);
          });

          // ── File detail computed ──
          const topMethodsLimit = 5;
          const showAllMethods = ref(false);

          const sortedFunctions = computed(() => {
            if (!fileDetail.value) return [];
            return [...fileDetail.value.functions].sort((a, b) => b.cyclomaticComplexity - a.cyclomaticComplexity);
          });

          const visibleFunctions = computed(() => {
            if (showAllMethods.value) return sortedFunctions.value;
            return sortedFunctions.value.slice(0, topMethodsLimit);
          });

          function toggleShowAllMethods() {
            showAllMethods.value = !showAllMethods.value;
          }

          // ── CC heat-bar helpers ──
          // Fill width is clamped at 3× threshold so a CC of 80 with
          // threshold 15 still produces a visually meaningful bar rather
          // than overflowing. The threshold marker sits at the "1.0×"
          // position (i.e. threshold/3threshold = 33%).
          function ccRatio(fn) {
            const max = fileDetail.value?.cyclomaticMax || 1;
            return Math.round((fn.cyclomaticComplexity / max) * 100);
          }

          function heatBarStyle(fn) {
            const max = fileDetail.value?.cyclomaticMax || 1;
            const cap = max * 3;
            const pct = Math.min(100, (fn.cyclomaticComplexity / cap) * 100);
            return { width: pct + "%", background: ccColor(fn) };
          }

          function thresholdMarker() {
            // threshold sits at 1/3 of the bar (since we cap at 3× threshold)
            return 33.33;
          }

          function ccColor(fn) {
            const max = fileDetail.value?.cyclomaticMax || 1;
            const r = fn.cyclomaticComplexity / max;
            if (r >= 2) return "var(--rating-E)"; // red — error (≥ 2×)
            if (r > 1) return "var(--rating-C)";  // yellow — warning
            if (r > 0.66) return "var(--rating-B)"; // yellow-green — near threshold
            return "var(--rating-A)";              // green — healthy
          }

          function ccTooltip(fn) {
            const max = fileDetail.value?.cyclomaticMax || 1;
            return (
              "CC " + fn.cyclomaticComplexity +
              " / threshold " + max +
              " (" + ccRatio(fn) + "% of threshold)"
            );
          }

          // ── Editor deep-link + jump-to-line ──
          // vscode:// handler accepts absolute paths. The `absolutePath`
          // field is resolved server-side through the workspace-traversal
          // guard, so this is safe to paste into an href.
          function editorLink(fn) {
            const abs = fileDetail.value?.absolutePath;
            if (!abs) return "#";
            return "vscode://file" + abs + ":" + fn.startLine + ":1";
          }

          function jumpToLine(lineNum) {
            // Source lines are keyed by 0-based index, so line N lives at
            // child index N-1 of `.source-view`.
            const view = document.querySelector(".source-view");
            if (!view) return;
            const row = view.children[lineNum - 1];
            if (!row) return;
            row.scrollIntoView({ behavior: "smooth", block: "center" });
            row.classList.remove("jump-target");
            // force reflow so the animation restarts on repeat clicks
            void row.offsetWidth;
            row.classList.add("jump-target");
          }

          const sortedFindings = computed(() => {
            if (!fileDetail.value) return [];
            return [...fileDetail.value.findings].sort((a, b) => a.startLine - b.startLine);
          });

          // Build a per-line lookup: line number → array of findings on that line
          const findingsByLine = computed(() => {
            const map = {};
            if (!fileDetail.value) return map;
            for (const f of fileDetail.value.findings) {
              const start = f.startLine;
              const end = f.endLine || start;
              for (let ln = start; ln <= end; ln++) {
                if (!map[ln]) map[ln] = [];
                map[ln].push(f);
              }
            }
            return map;
          });

          // Build a per-line lookup: line number → worst finding level
          const worstLevelByLine = computed(() => {
            const map = {};
            const rank = { error: 3, warning: 2, note: 1 };
            for (const [ln, findings] of Object.entries(findingsByLine.value)) {
              let worst = 0;
              let worstLevel = null;
              for (const f of findings) {
                const r = rank[f.level] || 0;
                if (r > worst) { worst = r; worstLevel = f.level; }
              }
              map[ln] = worstLevel;
            }
            return map;
          });

          // Build a set of function start lines for labels
          const fnStartLines = computed(() => {
            const map = {};
            if (!fileDetail.value) return map;
            for (const fn of fileDetail.value.functions) {
              map[fn.startLine] = fn.name + " (CC:" + fn.cyclomaticComplexity + ")";
            }
            return map;
          });

          function lineFindings(lineNum) {
            return findingsByLine.value[lineNum] || [];
          }

          function lineClass(lineNum) {
            const level = worstLevelByLine.value[lineNum];
            if (level === "error") return "line-error";
            if (level === "warning") return "line-warning";
            if (level === "note") return "line-note";
            if (fnStartLines.value[lineNum]) return "line-fn-start";
            return "";
          }

          function gutterClass(lineNum) {
            const level = worstLevelByLine.value[lineNum];
            if (level === "error") return "gutter-error";
            if (level === "warning") return "gutter-warning";
            return "gutter-note";
          }

          function lineFnLabel(lineNum) {
            return fnStartLines.value[lineNum] || "";
          }

          // ── Navigation ──
          function navigateToFile(path) {
            window.location.hash = "#file=" + encodeURIComponent(path);
          }

          function goBack() {
            window.location.hash = "";
          }

          async function loadFileDetail(path) {
            selectedFile.value = path;
            currentView.value = "file-detail";
            fileDetail.value = null;
            try {
              const res = await fetch("/api/file-detail?path=" + encodeURIComponent(path));
              if (!res.ok) throw new Error("HTTP " + res.status);
              fileDetail.value = await res.json();
            } catch (err) {
              fileDetail.value = null;
              error.value = "Failed to load file detail: " + (err.message || err);
              currentView.value = "dashboard";
            }
          }

          function handleHashChange() {
            const hash = window.location.hash;
            if (hash.startsWith("#file=")) {
              const path = decodeURIComponent(hash.substring(6));
              loadFileDetail(path);
            } else {
              currentView.value = "dashboard";
              selectedFile.value = null;
              fileDetail.value = null;
            }
          }

          // ── Dashboard data ──
          function formatTimestamp(iso) {
            try { return new Date(iso).toLocaleString(); }
            catch { return iso; }
          }

          async function refreshComplexity() {
            try {
              const res = await fetch("/api/complexity");
              if (res.ok) complexity.value = await res.json();
            } catch { /* non-fatal */ }
          }

          async function refresh() {
            loading.value = true;
            error.value = null;
            try {
              const res = await fetch("/api/score");
              if (!res.ok) throw new Error("HTTP " + res.status);
              score.value = await res.json();
            } catch (err) {
              error.value = err.message || String(err);
            } finally {
              loading.value = false;
            }
            refreshComplexity();
          }

          onMounted(() => {
            refresh();
            setInterval(refresh, 10_000);
            window.addEventListener("hashchange", handleHashChange);
            // Check if page loaded with a hash already
            handleHashChange();
          });

          onUnmounted(() => {
            window.removeEventListener("hashchange", handleHashChange);
          });

          return {
            currentView, selectedFile, fileDetail,
            score, complexity, loading, error,
            toolEntries, fileEntries, formatTimestamp,
            sortedFunctions, sortedFindings, visibleFunctions,
            showAllMethods, toggleShowAllMethods, topMethodsLimit,
            ccRatio, ccColor, ccTooltip, heatBarStyle, thresholdMarker,
            editorLink, jumpToLine,
            navigateToFile, goBack,
            lineFindings, lineClass, gutterClass, lineFnLabel,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
