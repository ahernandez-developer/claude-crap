name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel redundant runs of the same branch so PRs do not queue behind
# each other. Force pushes to main still run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: typecheck + build + test + doctor (node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        # CI installs skip the postinstall auto-build because we want
        # to exercise the `clean → build → test` path explicitly below.
        env:
          CLAUDE_SONAR_SKIP_POSTINSTALL: '1'
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build dist/
        run: npm run build

      - name: Unit and integration tests
        run: npm test

      - name: Doctor diagnostic (12 checks)
        run: node ./bin/claude-sonar.mjs doctor

      - name: Bug report (smoke)
        run: node ./bin/claude-sonar.mjs bug-report --stdout > /tmp/bug-report.md
        # Assert the bug report rendered correctly by checking for a
        # landmark heading. Keeps the CLI smoke test honest without
        # running a regex match on every line.
      - name: Assert bug report structure
        run: |
          test -s /tmp/bug-report.md
          grep -q '# claude-sonar bug report' /tmp/bug-report.md
          grep -q '## claude-sonar bug report\|# claude-sonar bug report' /tmp/bug-report.md
          grep -q 'Plugin files' /tmp/bug-report.md
          grep -q '\[exit code: 0\]' /tmp/bug-report.md

  fast-build:
    name: esbuild fast build smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        env:
          CLAUDE_SONAR_SKIP_POSTINSTALL: '1'
        run: npm ci --no-audit --no-fund

      - name: Fast build via esbuild
        run: npm run build:fast

      - name: Assert dist/ was rebuilt
        run: |
          test -f ./dist/index.js
          test -f ./dist/sdk.js
          test -f ./dist/metrics/index.js
          test -f ./dist/sarif/index.js
          test -f ./dist/ast/index.js
          test -f ./dist/tools/index.js
          test -f ./dist/adapters/index.js
